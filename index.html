<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SkyVayu — Private Charter Flights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0C1E36;
  --bg-secondary:#0E2040;
  --bg-card:#132B4A;
  --bg-card-hover:#163354;
  --gold:#E8D8A0;
  --gold-dim:rgba(232,216,160,0.6);
  --gold-faint:rgba(232,216,160,0.08);
  --blue:#185FA5;
  --blue-light:#85B7EB;
  --blue-faint:rgba(24,95,165,0.15);
  --blue-border:rgba(133,183,235,0.2);
  --green:#3B6D11;
  --green-light:#97C459;
  --green-faint:rgba(59,109,17,0.2);
  --text:#EEE8D5;
  --text-secondary:rgba(232,216,160,0.55);
  --text-tertiary:rgba(133,183,235,0.5);
  --border:rgba(133,183,235,0.12);
  --border-hover:rgba(133,183,235,0.28);
  --radius:8px;
  --radius-lg:12px;
  --font-display:'Cormorant Garamond', Georgia, serif;
  --font:'DM Sans', sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
nav{background:rgba(12,30,54,0.92);backdrop-filter:blur(12px);border-bottom:0.5px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo-wrap{display:flex;align-items:center;gap:13px;cursor:pointer;}
.logo-mark svg{display:block;}
.logo-text{display:flex;flex-direction:column;line-height:1;}
.logo-sky{font-family:var(--font);font-weight:300;font-size:11px;letter-spacing:3px;color:var(--blue-light);text-transform:uppercase;}
.logo-vayu{font-family:var(--font-display);font-weight:500;font-size:22px;color:var(--gold);letter-spacing:0.5px;}
.nav-links{display:flex;gap:28px;align-items:center;}
.nav-links a{font-size:13px;color:var(--text-secondary);text-decoration:none;cursor:pointer;letter-spacing:0.3px;transition:color .2s;}
.nav-links a:hover{color:var(--gold);}
.page{display:none;max-width:680px;margin:0 auto;padding:40px 20px 80px;}
.page.active{display:block;}
.page-hero{margin-bottom:32px;}
.page-hero h1{font-family:var(--font-display);font-size:38px;font-weight:300;color:var(--gold);letter-spacing:0.5px;line-height:1.2;margin-bottom:6px;}
.page-hero p{font-size:14px;color:var(--text-secondary);letter-spacing:0.2px;}
.page-hero h2{font-family:var(--font-display);font-size:28px;font-weight:300;color:var(--gold);letter-spacing:0.5px;margin-bottom:6px;}
.card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:20px 22px;margin-bottom:14px;}
.section-label{font-size:10px;font-weight:500;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:.1em;margin:28px 0 10px;}
.field-group{margin-bottom:16px;}
.field-label{font-size:12px;color:var(--text-secondary);display:block;margin-bottom:6px;letter-spacing:0.2px;}
input[type=text],input[type=number],input[type=date],input[type=time],input[type=password]{width:100%;height:40px;padding:0 14px;border:0.5px solid var(--border-hover);border-radius:var(--radius);background:rgba(255,255,255,0.04);color:var(--text);font-size:14px;font-family:var(--font);outline:none;transition:border-color .2s,box-shadow .2s;}
input:focus{border-color:var(--blue-light);box-shadow:0 0 0 3px rgba(133,183,235,.1);}
input::placeholder{color:rgba(133,183,235,0.3);}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.6);}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.toggle-group{display:flex;gap:6px;}
.toggle-btn{flex:1;padding:8px;font-size:12px;border:0.5px solid var(--border-hover);border-radius:var(--radius);background:transparent;color:var(--text-secondary);cursor:pointer;font-family:var(--font);transition:all .15s;}
.toggle-btn.active{background:var(--blue-faint);color:var(--blue-light);border-color:var(--blue-border);}
.btn-primary{width:100%;padding:14px;font-size:14px;font-weight:500;background:var(--blue);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-family:var(--font);margin-top:10px;letter-spacing:0.3px;transition:background .2s,transform .1s;}
.btn-primary:hover{background:#1a6dbb;}
.btn-primary:active{transform:scale(.99);}
.btn-success{width:100%;padding:14px;font-size:14px;font-weight:500;background:var(--green);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-family:var(--font);margin-top:10px;letter-spacing:0.3px;transition:background .2s;}
.btn-success:hover{background:#457d14;}
.btn-outline{width:100%;padding:12px;font-size:13px;background:transparent;border:0.5px solid var(--border-hover);border-radius:var(--radius);cursor:pointer;color:var(--text-secondary);font-family:var(--font);margin-top:10px;transition:border-color .2s,color .2s;}
.btn-outline:hover{border-color:var(--blue-border);color:var(--blue-light);}
.btn-select{padding:8px 18px;font-size:13px;background:transparent;border:0.5px solid var(--border-hover);border-radius:var(--radius);cursor:pointer;color:var(--text);font-family:var(--font);transition:all .15s;}
.btn-select:hover{background:var(--blue-faint);border-color:var(--blue-border);color:var(--blue-light);}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:20px;letter-spacing:0.3px;}
.badge-success{background:var(--green-faint);color:var(--green-light);border:0.5px solid rgba(59,109,17,0.3);}
.badge-warning{background:rgba(186,117,23,0.15);color:#EF9F27;border:0.5px solid rgba(186,117,23,0.25);}
.divider{border:none;border-top:0.5px solid var(--border);margin:16px 0;}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--border);font-size:14px;}
.row:last-child{border-bottom:none;}
.row-label{color:var(--text-secondary);}
.row-value{font-weight:500;color:var(--text);}
.trip-summary{background:rgba(255,255,255,0.03);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:24px;display:flex;gap:28px;flex-wrap:wrap;}
.trip-item{font-size:12px;color:var(--text-secondary);}
.trip-item span{color:var(--gold);font-weight:500;display:block;font-size:14px;margin-bottom:2px;}
.quote-card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:10px;transition:border-color .2s;}
.quote-card:hover{border-color:var(--blue-border);}
.quote-card.pending{opacity:.5;}
.op-name{font-size:15px;font-weight:500;color:var(--text);margin-bottom:2px;}
.op-meta{font-size:12px;color:var(--text-secondary);}
.detail-row{display:flex;gap:20px;margin-top:12px;flex-wrap:wrap;}
.detail-item{font-size:12px;color:var(--text-secondary);}
.detail-item strong{color:var(--blue-light);font-weight:500;}
.quote-footer{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:14px;border-top:0.5px solid var(--border);}
.quote-amount{font-family:var(--font-display);font-size:26px;font-weight:400;color:var(--gold);}
.quote-amount-label{font-size:11px;color:var(--text-secondary);margin-bottom:2px;}
.pay-tabs{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:18px;}
.pay-tab{flex:1;padding:10px 8px;font-size:13px;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;font-family:var(--font);text-align:center;border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:all .15s;}
.pay-tab.active{color:var(--blue-light);border-bottom-color:var(--blue-light);}
.pay-panel{display:none;}
.pay-panel.active{display:block;}
.upi-apps{display:flex;gap:8px;margin-bottom:14px;}
.upi-app{flex:1;padding:9px 6px;border:0.5px solid var(--border-hover);border-radius:var(--radius);font-size:12px;text-align:center;cursor:pointer;color:var(--text);background:transparent;font-family:var(--font);transition:all .15s;}
.upi-app.active{border-color:var(--blue-border);background:var(--blue-faint);color:var(--blue-light);}
.bank-option{display:flex;align-items:center;gap:10px;padding:10px 14px;border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;font-size:14px;color:var(--text);transition:all .15s;}
.bank-option.active{border-color:var(--blue-border);background:var(--blue-faint);color:var(--blue-light);}
.bank-option input[type=radio]{accent-color:var(--blue-light);width:auto;height:auto;background:none;border:none;}
.total-row{display:flex;justify-content:space-between;align-items:center;padding-top:14px;margin-top:4px;border-top:0.5px solid var(--border);}
.success-banner{background:var(--green-faint);border:0.5px solid rgba(59,109,17,0.3);border-radius:var(--radius-lg);padding:32px 24px;text-align:center;margin-bottom:24px;}
.check-circle{width:60px;height:60px;border-radius:50%;background:rgba(59,109,17,0.2);border:1px solid rgba(151,196,89,0.3);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.ref-box{background:rgba(0,0,0,.2);border-radius:var(--radius);padding:12px 18px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;border:0.5px solid var(--border);}
.ref-code{font-size:18px;font-weight:500;letter-spacing:.1em;font-family:monospace;color:var(--gold);}
.timeline{list-style:none;}
.timeline li{display:flex;gap:14px;padding-bottom:18px;}
.timeline li:last-child{padding-bottom:0
